<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Boa Noite, Amor ❤️</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap');

body, html {
  margin: 0; padding: 0;
  height: 100%;
  background: linear-gradient(135deg, #4B0000, #8B1A1A); /* vermelho escuro -> tom ligeiramente mais claro */
  font-family: 'Montserrat', sans-serif;
  color: #fff;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  text-align: center;
  padding: 20px;
  overflow: hidden;
  position: relative;
}

/* Texto principal */
h1 {
  font-weight: 700;
  font-size: 6vw;
  max-width: 90vw;
  letter-spacing: 0.05em;
  line-height: 1.2;
  color: #FF8DAA; /* rosa suave contrastando com fundo escuro */
  margin-bottom: 1rem;
  text-shadow: 0 0 10px #ff8daa, 0 0 20px #ff4d6d;
}

/* Frase invertida */
.upside-down {
  font-weight: 400;
  font-size: 3.5vw;
  max-width: 90vw;
  color: #F4A9C0; /* rosa claro */
  transform: rotate(180deg);
  user-select: none;
  opacity: 0.7;
  font-style: italic;
  margin-bottom: 30px;
  text-shadow: 0 0 5px #f4a9c0;
}

/* Botão do Spotify */
.spotify-btn {
  background: #FF4D6D;
  color: white;
  font-size: 1.2rem;
  padding: 12px 24px;
  border: none;
  border-radius: 30px;
  box-shadow: 0px 4px 12px rgba(0,0,0,0.25);
  font-weight: bold;
  cursor: pointer;
  text-decoration: none;
  transition: 0.2s ease;
}
.spotify-btn:hover {
  transform: scale(1.05);
}

/* Partículas rosas decorativas */
.particle {
  position: absolute;
  border-radius: 50%;
  background: #F4A9C0;
  opacity: 0.6;
  pointer-events: none;
  animation: floatUp 6s linear infinite;
}

@keyframes floatUp {
  0% { transform: translateY(100vh) scale(0.5); opacity:0.6; }
  50% { opacity:1; }
  100% { transform: translateY(-50vh) scale(0.2); opacity:0; }
}

@media (max-width: 480px) {
  h1 { font-size: 8vw; }
  .upside-down { font-size: 4.5vw; }
}
</style>
</head>
<body>

<h1>Boa noite, dorme bem, eu te amo</h1>
<div class="upside-down">
  La distance ne séparera pas ce que nous ressentons.
</div>

<a class="spotify-btn" href="https://open.spotify.com/track/3SOiQUQ988zKilwom5t0tS?si=F3EV7P5pSbG5DYKS_7aY4g" target="_blank">
  ▶️ Ouvir no Spotify
</a>

<!-- Partículas decorativas -->
<script>
  const numParticles = 20;
  for(let i=0;i<numParticles;i++){
    const p = document.createElement('div');
    p.className = 'particle';
    const size = Math.random()*12 + 5;
    p.style.width = size+'px';
    p.style.height = size+'px';
    p.style.left = Math.random()*100+'vw';
    p.style.animationDuration = (4 + Math.random()*4)+'s';
    p.style.background = `rgba(244, ${160+Math.random()*20}, ${192+Math.random()*20}, 0.6)`; // tons de rosa
    document.body.appendChild(p);
  }
</script>

</body>
</html>
